<div [ngClass]="className">
    <h2 *ngIf="section.title"
        [ngStyle]="{
            'font-size': section.titleFontSize || null,
            'font-weight': section.titleFontWeight || null,
            'font-style': section.titleFontStyle || null,
            'text-align': section.titleTextAlign || null,
            'color': section.titleColor || null,
        }">
        {{ section.title }}
    </h2>
    <div class="aboutUs-container" [class.fullWidth]="!(section.image || section.video)">
        <div *ngIf="section.image" class="image">                            
            <img [src]="section.image" alt="" width="100%" height="400px" loading="lazy" >
        </div>
        <div *ngIf="section.video" class="">
            <video [src]="smallDevice ? ((section.video_mob && section.video_mob !== '') ? section.video_mob : section.video) : section.video" muted class="video-banner" controls>
                Your browser does not support the video tag.
            </video>                                                   
            </div>
        <div *ngIf="section.content && section.content.length > 0" class="d-flex justify-content-center flex-column">
            <div class="card-content d-flex gap-3 mt-3 mb-3" *ngFor="let card of section.content">
                <div *ngIf="card.image">
                    <img class="card-img" [src]="card.image" alt="" width="40" height="40" loading="lazy">
                </div>
                <div class="p-2">
                    <h3 class="fw-bold mb-2 aboutus-h3"
                        [ngStyle]="{
                            'font-size': card.titleFontSize || null,
                            'font-weight': card.titleFontWeight || null,
                            'font-style': card.titleFontStyle || null,
                            'text-align': card.titleTextAlign || null
                        }">
                        {{card.title}}
                    </h3>
                    <div class="description" *ngIf="card.description"
                        [ngStyle]="{
                            'font-size': card.descriptionFontSize || null,
                            'font-weight': card.descriptionFontWeight || null,
                            'font-style': card.descriptionFontStyle || null,
                            'text-align': card.descriptionTextAlign || null
                        }"
                        innerHTML="{{card.description}}"></div>
                </div>
            </div>
        </div>
    </div>
</div>
