<div id="preheader" class="announcement-container">
    <div class="col-lg-12 no-padding" *ngIf="visibleAnnouncements?.length">
        <div
            class="preheader-carousel"
            [class.has-nav]="preHeaderCarouselConfig.showNav"
            [style.--preheader-arrow-color]="arrowColor">
            <evm-carousel
                [items]="visibleAnnouncements"
                [config]="preHeaderCarouselConfig"
                (itemClick)="announcementClicked($event.item)">
                <ng-template #itemTemplate let-announcement>
                    <div class="announcement" [innerHTML]="announcement.message"
                        [class.clickable]="hasAnnouncementLink(announcement)"
                        [attr.tabindex]="hasAnnouncementLink(announcement) ? 0 : null"
                        [attr.role]="hasAnnouncementLink(announcement) ? 'link' : null"
                        (keydown.enter)="announcementClicked(announcement)"
                        (keydown.space)="announcementClicked(announcement); $event.preventDefault()"
                        [ngStyle]="{
                            'color': announcement.foregroundColor,
                            'background-color': announcement.backgroundColor,
                            'font-size': announcement.fontSize ? (announcement.fontSize + 'px') : '1.1rem',
                            'height': getAnnouncementHeight(announcement)
                        }">
                    </div>
                </ng-template>
            </evm-carousel>
        </div>
    </div>
</div>
