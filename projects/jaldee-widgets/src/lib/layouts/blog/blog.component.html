<div id="{{section.id}}" class="container text-center mb-4 mt-5">
    <div>
        <div *ngIf="section.subTitle" class="mt-3 mb-3 subTitle"
            [ngStyle]="{
            'font-size': section.subTitleFontSize || null,
            'font-weight': section.subTitleFontWeight || null,
            'font-style': section.subTitleFontStyle || null,
            'text-align': section.subTitleTextAlign || null,
            'color': section.subTitleColor || null,
        }">
            {{section.subTitle}}
        </div>
        <div *ngIf="section.title">
            <h2 class="fw-normal mb-3"
                [ngStyle]="{
            'font-size': section.titleFontSize || null,
            'font-weight': section.titleFontWeight || null,
            'font-style': section.titleFontStyle || null,
            'text-align': section.titleTextAlign || null,
            'color': section.titleColor || null,
        }">
                {{section.title}}
            </h2>
        </div>
        <div *ngIf="blogs.length > 0" class="blogs-list-container">
            <div class="" *ngFor="let action of blogs; let i = index">
                <div class="blog-card pointer-cursor">
                    <img class="blog-img" [src]="action.image" alt="Blog Image" loading="lazy" priority="false">
                    <div>
                        <span class="fw-bold blog-title"
                            [ngStyle]="{
                                'font-size': action.titleFontSize || null,
                                'font-weight': action.titleFontWeight || null,
                                'font-style': action.titleFontStyle || null,
                                'text-align': action.titleTextAlign || null
                            }">
                            {{ action.title }}
                        </span>
                    </div>
                    <div class="mt-2" *ngIf="action.content">
                        <span class="blog-desc"
                            [ngStyle]="{
                                'font-size': action.descriptionFontSize || null,
                                'font-weight': action.descriptionFontWeight || null,
                                'font-style': action.descriptionFontStyle || null,
                                'text-align': action.descriptionTextAlign || null
                            }"
                            [innerHTML]="action.content"></span>
                    </div>
                    <div>
                        <button type="button" [id]="'btnReadMore'+i"
                            class="btn-readmore btn-primary"
                            (click)="_actionClicked(action,action.id)">
                            Read more
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
