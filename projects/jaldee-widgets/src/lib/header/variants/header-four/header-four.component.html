<header class="header-four" *ngIf="data">
  <div class="top-row">
    <div class="brand" (click)="emit({ type: 'home' })">
      <img *ngIf="logo || data['logo']" [src]="logo || data['logo']" [style.aspect-ratio]="aspectRatio || data['logoAspectRatio'] || data['aspectRatio'] || null" alt="Logo" />
    </div>
    <nav class="nav">
      <div
        class="nav-item-wrap"
        *ngFor="let item of visibleMenu"
        [class.has-submenu]="item.submenu?.length"
        [class.active]="isSubmenuActive(item)"
        [class.submenu-open]="item.showSubmenu"
        (mouseenter)="item.submenu?.length && showSubmenu(item)"
        (mouseleave)="item.submenu?.length && hideSubmenu(item)"
      >
        <button
          class="nav-item"
          (click)="handleMenuItemClick(item)"
        >
          <i *ngIf="item.icon" [ngClass]="item.icon"></i>
          {{ item.title }}
          <i *ngIf="item.submenu?.length" class="fa dropdown-icon" [class.fa-chevron-right]="smallDevice" [class.fa-chevron-down]="!smallDevice"></i>
        </button>
        <ul class="submenu" *ngIf="item.submenu?.length" [class.show]="item.showSubmenu">
          <li *ngFor="let subItem of item.submenu" (click)="menuClick(subItem)">
            <i *ngIf="subItem.icon" [ngClass]="subItem.icon"></i>
            {{ subItem.title }}
          </li>
        </ul>
      </div>
    </nav>
    <div class="actions">
      <button *ngIf="resolvedShowSearch" (click)="triggerSearch()">
        <i class="fa fa-search"></i>
      </button>
      <button type="button" (click)="goToWishlist()" *ngIf="resolvedShowWishlist">
        <i class="fa fa-heart-o"></i>
        <span>{{ wishlistCount || 0 }}</span>
      </button>
      <button type="button" (click)="goToCart()" *ngIf="resolvedShowCart">
        <i class="fa fa-shopping-bag"></i>
        <span>{{ cartCount || 0 }}</span>
      </button>
      <button *ngIf="showLogin" type="button" (click)="isLoggedIn ? emit({ type: 'user' }) : doLogin()">
        <i class="fa fa-user-circle-o"></i>
        <span>{{ isLoggedIn ? 'Account' : 'Login' }}</span>
      </button>
      <button *ngIf="showLogin && isLoggedIn" type="button" (click)="doLogout()">
        <i class="fa fa-sign-out"></i>
      </button>
    </div>
  </div>
</header>
