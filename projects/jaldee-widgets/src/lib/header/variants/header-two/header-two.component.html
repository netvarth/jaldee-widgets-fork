<header class="header-two" *ngIf="data">
  <div class="top-row">
    <nav class="nav-left" *ngIf="!smallDevice">
      <button
        class="nav-item"
        *ngFor="let item of visibleMenu"
        (click)="menuClick(item)"
      >
        <i *ngIf="item.icon" [ngClass]="item.icon"></i>
        {{ item.title }}
      </button>
    </nav>
    <div class="brand" (click)="emit({ type: 'home' })">
      <img *ngIf="logo || data.logo" [src]="logo || data.logo" [style.aspect-ratio]="aspectRatio || data['logoAspectRatio'] || data['aspectRatio'] || null" alt="Logo" />
    </div>
    <div class="actions">
      <button *ngIf="showLogin" type="button" (click)="isLoggedIn ? emit({ type: 'user' }) : doLogin()">
        <i class="fa fa-user-circle-o"></i>
        <span>{{ isLoggedIn ? 'Account' : 'Login' }}</span>
      </button>
      <button *ngIf="resolvedShowWishlist" type="button" (click)="goToWishlist()">
        <i class="fa fa-heart-o"></i>
        <span>Wishlist</span>
        <span *ngIf="wishlistCount">({{ wishlistCount }})</span>
      </button>
      <button *ngIf="resolvedShowCart" type="button" (click)="goToCart()">
        <i class="fa fa-shopping-bag"></i>
        <span>Cart</span>
        <span *ngIf="cartCount">({{ cartCount }})</span>
      </button>
    </div>
  </div>
  <div class="middle" *ngIf="resolvedShowSearch">
    <div class="search">
      <input
        type="text"
        placeholder="Search"
        [(ngModel)]="searchValue"
        (ngModelChange)="emit({ type: 'search', payload: $event })"
        (keyup.enter)="triggerSearch()"
        (focus)="onSearchFocus()"
        (blur)="onSearchBlur()"
      />
      <button type="button" (click)="triggerSearch()">
        <svg class="search-icon" viewBox="0 0 24 24">
          <path d="M15.5 14h-.79l-.28-.27A6 6 0 1 0 14 15.5l.27.28v.79L20 21.5 21.5 20ZM6.5 11a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0Z" />
        </svg>
      </button>
      <ul class="search-suggestions" *ngIf="showSuggestions && searchSuggestions?.length">
        <li *ngFor="let item of searchSuggestions" (mousedown)="selectSuggestion(item)">
          <div class="suggestion-title">{{ item?.name }}</div>
          <div class="suggestion-subtitle" *ngIf="item?.sOrderCatalogName">{{ item?.sOrderCatalogName }}</div>
        </li>
      </ul>
    </div>
  </div>
</header>
