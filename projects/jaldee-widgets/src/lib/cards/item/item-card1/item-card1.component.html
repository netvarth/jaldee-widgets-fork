<article class="item-card1 pointer-cursor" *ngIf="content">
  <div class="item-card1__image">
    <video
      *ngIf="content.video && content.video !== ''"
      [src]="smallDevice ? ((content.video_mob && content.video_mob !== '') ? content.video_mob : content.video) : content.video"
      [style.aspect-ratio]="smallDevice ? (content.image_mob_aspectRatio || content.image_aspectRatio || null) : (content.image_aspectRatio || null)"
      (click)="$event.stopPropagation()"
      muted
      controls
      playsinline>
    </video>
    <img *ngIf="(!content.video || content.video === '') && (content.image || (content.image_mob && content.image_mob !== ''))"
      [lazyImage]="smallDevice ? ((content.image_mob && content.image_mob !== '') ? content.image_mob : content.image) : content.image"
      [alt]="content.title" loading="lazy" />
    <span *ngIf="content.badgeText" class="item-card1__badge">{{ content.badgeText }}</span>
  </div>
  <div class="item-card1__content">
    <h3 *ngIf="content.title" class="item-card1__title"
      [ngStyle]="{
        'font-size': content.titleFontSize || null,
        'font-weight': content.titleFontWeight || null,
        'font-style': content.titleFontStyle || null,
        'text-align': content.titleTextAlign || null
      }">
      {{ content.title }}
    </h3>
    <p *ngIf="content.subTitle" class="item-card1__subtitle"
      [ngStyle]="{
        'font-size': content.subTitleFontSize || null,
        'font-weight': content.subTitleFontWeight || null,
        'font-style': content.subTitleFontStyle || null,
        'text-align': content.subTitleTextAlign || null
      }">
      {{ content.subTitle }}
    </p>
    <div *ngIf="content.price || content.mrp" class="item-card1__prices">
      <span class="item-card1__mrp" *ngIf="content.mrp && content.mrp !== content.price">
        {{ getCurrencySymbol() }}{{ content.mrp }}
      </span>
      <span class="item-card1__price" *ngIf="content.price">
        {{ getCurrencySymbol() }}{{ content.price }}
      </span>

    </div>
  </div>
</article>
