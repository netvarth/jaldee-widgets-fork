<div class="p-0">
    <div class="image-container">
        <video
            *ngIf="content.video && content.video !== ''"
            [src]="smallDevice ? ((content.video_mob && content.video_mob !== '') ? content.video_mob : content.video) : content.video"
            [style.aspect-ratio]="smallDevice ? (content.image_mob_aspectRatio || content.image_aspectRatio || null) : (content.image_aspectRatio || null)"
            (click)="$event.stopPropagation()"
            muted
            controls
            playsinline>
        </video>
        <img [lazyImage]="smallDevice?((content.image_mob && content.image_mob!='')?content.image_mob:content.image):content.image"
            [alt]="content.title" *ngIf="(!content.video || content.video === '') && (content.image || (content.image_mob && content.image_mob!=''))" loading="lazy">
        <button type="button"  [id]="'btnItem'" [ngStyle]="{
    'color': content.foregroundColor,
    'background-color': content.backgroundColor
  }"
            class="btn-viewItem p-button-primary btn-primary pull-right" *ngIf="!smallDevice"
            (click)="_contentClicked(content,'.')">{{content.buttonCaption || 'View Item'}}</button>
    </div>
    <div class="content-wrapper">
        <div *ngIf="content.title && content.title!='' || (content.name && content.name!='')">
            <div class="card-title"
                [ngStyle]="{
                    'font-size': content.titleFontSize || null,
                    'font-weight': content.titleFontWeight || null,
                    'font-style': content.titleFontStyle || null,
        'text-align': content.titleTextAlign || null
                }">
                {{content.title || content.name}}
            </div>
            <div class="card-subtitle" *ngIf="content.subTitle"
                [ngStyle]="{
                    'font-size': content.subTitleFontSize || null,
                    'font-weight': content.subTitleFontWeight || null,
                    'font-style': content.subTitleFontStyle || null,
        'text-align': content.subTitleTextAlign || null
                }">
                {{content.subTitle}}
            </div>
            <div *ngIf="content.price || content.mrp">
                <span class="price-item test" *ngIf="content.price"><span class="currency_symbol">₹</span>{{ content.price }}</span>
                <span class="mrp" *ngIf="content.mrp && content.mrp!=content.price"><span class="currency_symbol">₹</span>{{ content.mrp }}</span>
            </div>
        </div>
    </div>
</div>
