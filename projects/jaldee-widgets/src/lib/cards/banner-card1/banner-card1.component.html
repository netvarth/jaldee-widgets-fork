<div class="banner-wrapper">
  <div class="banner-image">
    <img
      *ngIf="(!content.video || content.video === '') && !smallDevice && !mediumDevice"
      [src]="content.image"
      [alt]="content.title"
    />
    <img
      *ngIf="(!content.video || content.video === '') && (smallDevice || mediumDevice)"
      [src]="content.image_mob ? content.image_mob : content.image"
      [alt]="content.title"
    />
    <video
      *ngIf="content.video && content.video !== ''"
      [src]="(smallDevice || mediumDevice) ? ((content.video_mob && content.video_mob !== '') ? content.video_mob : content.video) : content.video"
      [style.aspect-ratio]="(smallDevice || mediumDevice) ? (content.image_mob_aspectRatio || content.image_aspectRatio || null) : (content.image_aspectRatio || null)"
      (click)="$event.stopPropagation()"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
    >
      Your browser does not support the video tag.
    </video>
    <div class="banner-content">
      <div class="cover-profile">
        <div *ngIf="content.title">
          <h4
            class="fs-4"
            *ngIf="content.subTitle"
            [ngStyle]="{
              'font-size': content.subTitleFontSize || null,
              'font-weight': content.subTitleFontWeight || null,
              'font-style': content.subTitleFontStyle || null,
        'text-align': content.subTitleTextAlign || null
            }"
          >
            {{ content.subTitle }}
          </h4>
        </div>
        <div *ngIf="content.title">
          <h1
            class="fw-bold mb-2 mb-md-4"
            [ngStyle]="{
              'font-size': content.titleFontSize || null,
              'font-weight': content.titleFontWeight || null,
              'font-style': content.titleFontStyle || null,
        'text-align': content.titleTextAlign || null
            }"
          >
            {{ content.title }}
          </h1>
        </div>
        <div *ngIf="content.description" class="profile-description">
          <p
            [ngStyle]="{
              'font-size': content.descriptionFontSize || null,
              'font-weight': content.descriptionFontWeight || null,
              'font-style': content.descriptionFontStyle || null,
        'text-align': content.descriptionTextAlign || null
            }"
            [innerHTML]="content.description"
          ></p>
        </div>
        <div>
          <button
            *ngIf="content.buttonCaption"
            type="button"
            (click)="_contentClicked(content)"
            class="banner-button"
            id="btnBookNow"
            (mouseenter)="isHovered = true"
            (mouseleave)="isHovered = false"
            [ngStyle]="{
              'color': isHovered ? content.backgroundColor : content.foregroundColor,
              'background-color': isHovered ? content.foregroundColor : content.backgroundColor,
              'border-color': isHovered ? content.backgroundColor : content.foregroundColor
            }"
          >
            {{ content.buttonCaption }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
