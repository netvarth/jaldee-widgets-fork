<div class="testimonial-card" *ngIf="content" [ngStyle]="{ 'background-color': content.backgroundColor || '#f5f5f5' }">
  <div class="testimonial-container">

    <div class="testimonial-image" *ngIf="content.video || content.image">
      <video
        *ngIf="content.video && content.video !== ''"
        [src]="content.video"
        [style.aspect-ratio]="content.image_aspectRatio || null"
        (click)="$event.stopPropagation()"
        muted
        controls
        playsinline>
      </video>
      <img *ngIf="(!content.video || content.video === '') && content.image" [lazyImage]="content.image" [alt]="content.authorName || content.title || 'Customer Image'" loading="lazy">
    </div>

    <div class="testimonial-content">
      <span
        class="testimonial-text"
        *ngIf="content.description || content.text"
        [innerHTML]="content.description || content.text"
        [ngStyle]="descriptionStyles">
      </span>

      <div class="testimonial-author">
        <div
          class="author-name"
          *ngIf="content.authorName"
          [ngStyle]="titleStyles">
          {{ content.authorName }}
        </div>
        <div
          class="author-location"
          *ngIf="content.authorLocation"
          [ngStyle]="subTitleStyles">
          {{ content.authorLocation }}
        </div>
        <div
          class="author-title"
          *ngIf="content.title && !content.authorName"
          [ngStyle]="titleStyles">
          {{ content.title }}
        </div>
        <div
          class="author-location"
          *ngIf="content.subTitle && !content.authorLocation"
          [ngStyle]="subTitleStyles">
          {{ content.subTitle }}
        </div>
      </div>
    </div>

  </div>
</div>
