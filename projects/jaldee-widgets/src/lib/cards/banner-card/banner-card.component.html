<div class="cover-section">
    <img [src]="content.image" [alt]="content.title" *ngIf="(!content.video || content.video === '') && !smallDevice">
    <img [src]="content.image_mob ? content.image_mob : content.image" [alt]="content.title" *ngIf="(!content.video || content.video === '') && smallDevice">
    <video
        *ngIf="content.video && content.video !== ''"
        [src]="smallDevice ? ((content.video_mob && content.video_mob !== '') ? content.video_mob : content.video) : content.video"
        [style.aspect-ratio]="smallDevice ? (content.image_mob_aspectRatio || content.image_aspectRatio || null) : (content.image_aspectRatio || null)"
        (click)="$event.stopPropagation()"
        autoplay
        muted
        loop
        playsinline
        preload="auto">
        Your browser does not support the video tag.
    </video>
    <div class="cover-content"
        *ngIf="content.title!='' || content.subTitle!='' || content.description!='' || content.buttonCaption!=''"
        [ngStyle]="{ 'color': content.foregroundColor, 'background-color': content.backgroundColor  }">
        <div class="cover-profile">
            <div>
                <h4 class="fs-4 text-capitalize" *ngIf="content.subTitle"
                    [ngStyle]="{
                        'font-size': content.subTitleFontSize || null,
                        'font-weight': content.subTitleFontWeight || null,
                        'font-style': content.subTitleFontStyle || null,
        'text-align': content.subTitleTextAlign || null
                    }">
                    {{content.subTitle}}
                </h4>
            </div>
            <div>
                <hr class="divider">
            </div>
            <div *ngIf="content['title']">
                <h1 class="fw-bold business-name text-uppercase mb-2 mb-md-4"
                    [ngStyle]="{
                        'font-size': content.titleFontSize || null,
                        'font-weight': content.titleFontWeight || null,
                        'font-style': content.titleFontStyle || null,
        'text-align': content.titleTextAlign || null
                    }">
                    {{content.title}}
                </h1>
            </div>
            <div class="profile-description" *ngIf="content.description">
                <p [ngStyle]="{
                    'font-size': content.descriptionFontSize || null,
                    'font-weight': content.descriptionFontWeight || null,
                    'font-style': content.descriptionFontStyle || null,
        'text-align': content.descriptionTextAlign || null
                }"
                    [innerHTML]="content.description"></p>
            </div>
            <div>
                <button type="button" (click)="_contentClicked(content)" class="booknow" id="btnBookNow"
                    *ngIf="content.buttonCaption" (mouseenter)="isHovered = true" (mouseleave)="isHovered = false"
                    [ngStyle]="{
    'color': isHovered ? content.foregroundColor : content.backgroundColor,
    'background-color': isHovered ? content.backgroundColor : content.foregroundColor,
    'border-color': isHovered ? content.foregroundColor : content.backgroundColor
  }">
                    {{content.buttonCaption}}
                </button>
            </div>
        </div>
    </div>
</div>
