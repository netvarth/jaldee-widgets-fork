<div class="category-card" *ngIf="content" [ngStyle]="{
  'background': content.backgroundColor || '#f5f5f5'
}">
  <div class="category-card__media">
    <video
      *ngIf="content.video && content.video !== ''"
      [src]="content.video"
      [style.aspect-ratio]="content.image_aspectRatio || null"
      (click)="$event.stopPropagation()"
      muted
      controls
      playsinline>
    </video>
    <img *ngIf="(!content.video || content.video === '') && content.image" [lazyImage]="content.image" [alt]="content.title" loading="lazy" priority="false">
    <div class="category-card__overlay">
      <p class="category-card__tag" *ngIf="content.tag">{{ content.tag }}</p>
      <h3 class="category-card__title" *ngIf="content.title"
        [ngStyle]="{
          'font-size': content.titleFontSize || null,
          'font-weight': content.titleFontWeight || null,
          'font-style': content.titleFontStyle || null,
        'text-align': content.titleTextAlign || null
        }">{{ content.title }}</h3>
      <p class="category-card__subtitle" *ngIf="content.subTitle"
        [ngStyle]="{
          'font-size': content.subTitleFontSize || null,
          'font-weight': content.subTitleFontWeight || null,
          'font-style': content.subTitleFontStyle || null,
        'text-align': content.subTitleTextAlign || null
        }">{{ content.subTitle }}</p>
    </div>
  </div>
</div>
