<div class="card p-0" *ngIf="content" [ngStyle]="{
  'color': content.foregroundColor,'background':  (content.backgroundColor || 'transparent')}">
  <div class="card-image">
    <video
      *ngIf="content.video && content.video !== ''"
      [src]="content.video"
      [style.aspect-ratio]="content.image_aspectRatio || '1/1'"
      (click)="$event.stopPropagation()"
      muted
      controls
      playsinline>
    </video>
    <img *ngIf="(!content.video || content.video === '') && content.image" [lazyImage]="content.image" alt="Card image cap" loading="lazy" priority="false">
    <div *ngIf="content.title" class="card-title pt-2"
      [ngStyle]="{
        'font-size': content.titleFontSize || null,
        'font-weight': content.titleFontWeight || null,
        'font-style': content.titleFontStyle || null,
        'text-align': content.titleTextAlign || null
      }">
      {{content.title}}
    </div>
  </div>
</div>
